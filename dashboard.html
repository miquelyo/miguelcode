<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiguelCode Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* Ini bagian kecil untuk header mobile (biar sidebar bisa dibuka) */
    .mobile-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background-color: #695CFE;
      color: white;
    }
    .mobile-header .menu-toggle {
      font-size: 20px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }
    .mobile-header .mobile-title {
      font-weight: 600;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      .mobile-header {
        display: flex;
      }
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .sidebar.open {
        transform: translateX(0);
        z-index: 200;
      }
      .home {
        left: 0 !important;
        width: 100% !important;
      }
    }
  </style>
</head>
<body>

  <!-- Header Mobile -->
  <div class="mobile-header">
    <button class="menu-toggle"><i class="fas fa-bars"></i></button>
    <h1 class="mobile-title">MiguelCode</h1>
  </div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <header>
      <div class="image-text">
        <span class="image">
          <img src="logo.png" alt="Logo" />
        </span>
        <div class="text logo-text">
          <span class="name">MiguelCode</span>
          <span class="profession">Dashboard</span>
        </div>
      </div>
      <i class="fas fa-angle-left toggle"></i>
    </header>

    <div class="menu-bar">
      <ul class="menu-links">
        <li><a href="dashboard.html"><i class="fas fa-home icon"></i><span class="text">Beranda</span></a></li>
        <li><a href="sertifikat.html"><i class="fas fa-certificate icon"></i><span class="text">Sertifikat</span></a></li>
        <li><a href="dokumen.html"><i class="fas fa-file-alt icon"></i><span class="text">Dokumen</span></a></li>
        <li><a href="akun.html"><i class="fas fa-user icon"></i><span class="text">Akun Digital</span></a></li>
        <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt icon"></i><span class="text">Keluar</span></a></li>
      </ul>
    </div>
  </nav>

  <!-- Konten Utama -->
  <section class="home">
    <div class="text">Selamat Datang di Dashboard MiguelCode</div>
  </section>

  <script>
    const sidebar = document.querySelector(".sidebar");
    const toggle = document.querySelector(".toggle");
    const menuToggle = document.querySelector(".menu-toggle");

    // Toggle sidebar collapse
    toggle.addEventListener("click", () => {
      sidebar.classList.toggle("close");
    });

    // Toggle sidebar mobile
    menuToggle.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });

    // Optional logout button
    document.getElementById("logoutBtn").addEventListener("click", () => {
      alert("Logout berhasil");
    });
  </script>

</body>
</html>
