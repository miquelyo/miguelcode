<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <!-- iOS Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MiguelCode">
 <link rel="apple-touch-icon" href="../assets/icon/icon.png">
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Boxicons CDN -->
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<!-- Android/Chrome PWA Manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#fff" id="meta-theme-color">
<!-- Favicon .ico -->
<link rel="icon" type="image/x-icon" href="assets/icon/icon.ico">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<!-- Favicon PNG -->
<link rel="icon" type="image/png" href="assets/icon/icon.png" sizes="192x192">
  <title>Login | MiguelCode</title>
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>
<div class="splash-screen">
  <div class="splash-logo">
  <!-- Simpan di dalam splash-screen -->
<svg class="logo-svg" viewBox="0 0 300 100">
  <text x="50%" y="50%" text-anchor="middle" font-size="40" fill="none" stroke="#0ff" stroke-width="2" font-family="'Press Start 2P', monospace" >
    MiguelCode
  </text>
</svg>
</div>
</div>

<div id="loadingScreen" class="loading-screen" style="display: none;">
  <div class="spinner"></div>
</div>

  <div class="wrapper">
    <div class="animation-wrapper">
      <div class="animation">
        <canvas id="riveCanvas" width="300" height="300"></canvas>
      </div>
    </div>

    <div class="login-container">
      <form class="login-form" onsubmit="login(event)">
        <h2 style="text-align:center;">Login MiguelCode</h2>
        <input type="text" id="username" placeholder="Username" required />
        <div class="password-wrapper">
  <input type="password" id="password" placeholder="Password" required />
  <i class='bx bx-hide toggle-password' id="togglePassword"></i>
</div>

        <button type="submit">Login</button>
        <div class="portfolio-link">
  <a href="index.html">Lihat Portfolio</a>
</div>

      </form>
    </div>
  </div>

  <!-- Script Supabase & Rive -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/supabase.js"></script>
  <script type="module" src="./assets/js/login.js"></script>
  <script src="https://unpkg.com/@rive-app/webgl"></script>

  <script>
    const stateMachineName = "State Machine 1";
    const canvas = document.getElementById("riveCanvas");

    fetch("login.riv")
      .then(res => res.arrayBuffer())
      .then(buffer => {
        const riveInstance = new rive.Rive({
          buffer,
          canvas,
          autoplay: true,
          stateMachines: [stateMachineName],
          onLoad: () => {
            const inputs = riveInstance.stateMachineInputs(stateMachineName);
            const handsUp = inputs.find(i => i.name === "hands_up");
            const success = inputs.find(i => i.name === "success");
            const fail = inputs.find(i => i.name === "fail");
            const check = inputs.find(i => i.name === "Check");

            if (!handsUp || !success || !fail || !check) {
              console.warn("Input Rive tidak ditemukan.");
              return;
            }

            const passwordInput = document.getElementById("password");
            passwordInput.addEventListener("focus", () => handsUp.value = true);
            passwordInput.addEventListener("blur", () => handsUp.value = false);

            const usernameInput = document.getElementById("username");
            usernameInput.addEventListener("input", () => check.fire());

            window.__riveInputs = { success, fail };
          }
        });
      })
      .catch(err => console.error("Gagal load Rive:", err));
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('Service Worker Registered'));
  }
</script>

<script src="assets/js/theme-color.js"></script>
</body>
</html>
