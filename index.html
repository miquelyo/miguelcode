<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>MiguelCode</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./miguelcode.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Theme Color (browser bar / Android) -->
    <meta name="theme-color" content="#000000" />

    <!-- iPhone / iPad Home Screen Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MiguelCode" />

    <!-- Apple Touch Icon (iPhone icon) -->
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch.png" />

    <!-- SPA redirect restore script (for GitHub Pages 404.html redirect) -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
