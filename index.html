<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance | MiguelCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* ==== Reset & Font ==== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      animation: fadeInUp 1.2s ease;
    }

    .gear {
      font-size: 80px;
      margin-bottom: 20px;
      animation: spin 2s linear infinite;
      display: inline-block;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      font-size: 1.1rem;
      color: #e2e8f0;
    }

    /* Animations */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      .gear {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gear">⚙️</div>
    <h1>Sedang Maintenance</h1>
    <p>Situs kami sedang dalam perbaikan untuk memberikan pengalaman terbaik. Silakan kembali lagi nanti.</p>
  </div>
</body>
</html>
