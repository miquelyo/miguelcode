<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <form id="reset-form">
      <h2>Reset Password</h2>
      <p>Masukkan password baru kamu di bawah ini.</p>
      <input type="password" id="new-password" placeholder="Password Baru" required />
      <button type="submit">Atur Ulang Password</button>
      <p id="status-message" style="margin-top: 1rem; font-size: 0.9rem;"></p>
    </form>
  </main>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="reset-password.js"></script>
</body>
</html>
