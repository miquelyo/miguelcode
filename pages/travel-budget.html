<!-- Main Content -->
<main class="main-content travel-budget-page">
  <h1>Travel Budget</h1>
  <p>Rencanakan perjalananmu secara rinci dan efektif.</p>

  <!-- Form Tambah Travel -->
 <!-- Tombol buka modal -->
<button id="openModalBtn" class="btn-tambah">+ Tambah Travel</button>

<!-- Modal -->
<div id="travelModal" class="modal">
  <div class="modal-content">
    <button class="close" id="closeModalBtn" aria-label="Tutup Modal">&times;</button>
    <h2>Tambah Travel</h2>
    <form id="travelForm">
      <input type="text" id="tujuan" placeholder="Tempat Tujuan" required />
      <input type="number" id="hari" placeholder="Jumlah Hari" required />
      <input type="number" id="malam" placeholder="Jumlah Malam" required />
      <input type="text" id="catatan" placeholder="Catatan" />
      <button type="submit" class="btn-simpan">Simpan</button>
    </form>
  </div>
</div>



  <!-- Tabel Travel -->
  <div class="table-container travel-list">
    <table id="travelTable">
      <thead>
        <tr>
          <th>Tujuan</th>
          <th>Hari/Malam</th>
          <th>Catatan</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="travelTableBody"></tbody>
    </table>
  </div>
</main>
