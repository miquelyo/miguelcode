<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dokumen Pribadi | MiguelCode</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body>
  <div class="dashboard">
    <nav class="sidebar">
      <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
      <a href="sertifikat.html" class="nav-item"><i class="fas fa-certificate"></i><span>Sertifikat</span></a>
      <a href="dokumen.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>Dokumen</span></a>
      <a href="akun.html" class="nav-item"><i class="fas fa-shield-alt"></i><span>Akun Digital</span></a>
      <a href="#" class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Keluar</span></a>
    </nav>

    <main class="main-content">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>Dokumen Pribadi</h1>
        <button id="openModal" class="btn-plus"><i class="fas fa-plus"></i></button>
      </div>

      <table>
        <thead>
          <tr>
            <th style="padding: 0.75rem;">Nama File</th>
            <th style="padding: 0.75rem;">Tanggal Upload</th>
            <th style="padding: 0.75rem;">Preview</th>
            <th style="padding: 0.75rem;">Aksi</th>
          </tr>
        </thead>
        <tbody id="dokumenTable">
          <!-- Data akan dimuat lewat dokumen.js -->
        </tbody>
      </table>
    </main>
  </div>

  <!-- Modal Upload -->
  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h2>Upload Dokumen</h2>
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" />
      <p id="previewText" style="font-size:0.9rem;color:#374151;"></p>

      <div style="margin-top:1.5rem;text-align:right;">
        <button id="cancelBtn" class="btn-cancel">Batal</button>
        <button id="uploadBtn" class="btn-upload">Upload</button>
      </div>
    </div>
  </div>

  <!-- Modal Preview File -->
  <div id="previewModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999">
    <div style="background:#fff;padding:1rem;max-width:90%;max-height:90%;overflow:auto;border-radius:8px;position:relative">
      <button id="closePreview" style="position:absolute;top:10px;right:10px;background:none;border:none;font-size:1.5rem;cursor:pointer">&times;</button>
      <div id="previewContent"></div>
    </div>
  </div>

  <script type="module" src="dokumen.js"></script>
  <script>
    const modal = document.getElementById("modal");
    document.getElementById("openModal").onclick = () => modal.style.display = "flex";
    document.getElementById("cancelBtn").onclick = () => {
      modal.style.display = "none";
      document.getElementById("fileInput").value = "";
      document.getElementById("previewText").textContent = "";
    };

    document.getElementById("fileInput").addEventListener("change", function(){
      const file = this.files[0];
      const preview = document.getElementById("previewText");
      if (!file) {
        preview.textContent = "";
        return;
      }

      const validTypes = ["application/pdf", "image/jpeg", "image/png"];
      if (!validTypes.includes(file.type)) {
        preview.textContent = "❌ Hanya PDF, JPG, atau PNG";
        this.value = "";
        return;
      }

      if (file.size > 2 * 1024 * 1024) {
        preview.textContent = "❌ Ukuran maksimum 2MB";
        this.value = "";
        return;
      }

      preview.textContent = `✅ File: ${file.name}`;
    });
  </script>
</body>
</html>
